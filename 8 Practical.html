<!DOCTYPE html>
<html>
<head>
    <title>Website Homepage</title>

    <style>
        *{
            margin:0;
            padding:0;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        header{
            background:#0077cc;
            color:white;
            text-align:center;
            padding:20px;
        }

        nav{
            background:#333;
            padding:15px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:20px;
            font-weight:bold;
        }

        .banner{
            background:#66b3ff;
            color:white;
            text-align:center;
            padding:80px;
        }

        .content{
            display:flex;
            justify-content:space-around;
            margin:30px;
        }

        .box{
            width:28%;
            background:white;
            padding:20px;
            text-align:center;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        footer{
            background:#333;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:30px;
        }
    </style>

</head>

<body>

<header>
    <h1>My Website</h1>
    <p>Welcome to Our Homepage</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Gallery</a>
    <a href="#">Contact</a>
</nav>

<div class="banner">
    <h2>Welcome to Our Website</h2>
    <p>Your success is our priority.</p>
</div>

<div class="content">

    <div class="box">
        <h3>Service 1</h3>
        <p>Website Design</p>
    </div>

    <div class="box">
        <h3>Service 2</h3>
        <p>Graphic Design</p>
    </div>

    <div class="box">
        <h3>Service 3</h3>
        <p>Digital Marketing</p>
    </div>

</div>

<footer>
    <p>&copy; 2026 My Website | All Rights Reserved</p>
</footer>

</body>
</html>
