<!DOCTYPE html>
<html>
<head>
    <title>Multimedia Presentation</title>
</head>
<body>

    <h1>Building Blocks of Multimedia</h1>

    <h2>1. Text</h2>
    <p>This is an example of text used in a multimedia presentation.</p>

    <h2>2. Image</h2>
    <img src="nature.jpg" alt="Nature Image" width="300">

    <h2>3. Audio</h2>
    <audio controls>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <h2>4. Video</h2>
    <video width="400" controls>
        <source src="video.mp4" type="video/mp4">
    </video>

    <h2>5. Hyperlink</h2>
    <a href="https://www.google.com" target="_blank">Visit Google</a>

</body>
</html>
